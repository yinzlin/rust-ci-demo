# ============================================
# 持续部署 (CD) 工作流
# 触发条件: CI工作流成功完成后自动触发
# 流程: Docker镜像构建 → 推送到仓库 → 生产环境部署通知
# ============================================
name: CD

# ============================================
# 触发条件配置
# workflow_run: 监听另一个工作流的完成事件
# - workflows: [CI] - 监听CI工作流
# - types: [completed] - 在CI完成时触发
# - branches: [main] - 仅当CI在main分支运行时触发
# ============================================
on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

# ============================================
# 全局环境变量
# REGISTRY: 容器镜像仓库地址，ghcr.io为GitHub容器注册表
# IMAGE_NAME: 镜像名称，使用github.repository格式，如owner/project-name
# ============================================
env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

# ============================================
# 作业定义
# build-and-push → deploy (串行执行)
# ============================================
jobs:
  # ------------------------------------------
  # 作业1: 构建并推送Docker镜像
  # 目的: 将代码打包成Docker镜像并推送到容器仓库
  # 前置条件: CI工作流必须成功完成
  # 符合规则7: Docker+Nginx部署
  # ------------------------------------------
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    # 仅当CI成功时才执行，失败则跳过
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    # 权限配置: packages.write允许推送镜像到GitHub Container Registry
    permissions:
      contents: read
      packages: write
    steps:
      # 检出代码
      - uses: actions/checkout@v4

      # 配置Docker Buildx，支持多平台构建和高级构建选项
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 登录容器仓库
      # 使用GITHUB_TOKEN进行认证，push镜像时自动使用该凭证
      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 提取镜像元数据，生成版本标签
      # 支持的标签策略:
      # - branch: 根据分支名生成标签
      # - sha: 根据commit SHA生成唯一标签
      # - semver: 识别语义化版本标签 (v1.2.3)
      # - latest: main分支自动添加latest标签
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      # 构建并推送镜像
      # - context: . 表示构建上下文为当前目录
      # - push: true 构建成功后自动推送到仓库
      # - cache-from/cache-to: 使用GitHub Actions缓存加速构建
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # 使用GitHub Actions缓存加速后续构建
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ------------------------------------------
  # 作业2: 部署通知
  # 目的: 镜像构建完成后，输出部署就绪信息
  # 说明: 实际部署逻辑需根据具体基础设施配置
  # 支持: docker-compose、kubernetes、Serverless等
  # 符合规则7: Docker+Nginx部署
  # ------------------------------------------
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    # 依赖build-and-push作业，必须镜像构建完成才能部署
    needs: build-and-push
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      # 输出部署就绪通知
      # ::notice:: 是GitHub Actions的特殊语法，在日志中显示醒目标记
      - name: Deploy notification
        run: |
          echo "::notice title=Deployment Ready::"
          echo "Docker image pushed to: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          echo "Ready for deployment via docker-compose or k8s"

      # 输出环境信息，便于追踪部署记录
      - name: Environment info
        run: |
          echo "Branch: ${{ github.ref_name }}"
          echo "Run ID: ${{ github.run_id }}"