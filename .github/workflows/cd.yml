# ============================================
# 持续部署 (CD) 工作流
# 触发条件: CI工作流成功完成后自动触发
# 流程: 前端构建 → 后端构建 → Docker镜像构建 → 部署
# ============================================
name: CD

# ============================================
# 触发条件配置
# workflow_run: 监听另一个工作流的完成事件
# - workflows: [CI] - 监听CI工作流
# - types: [completed] - 在CI完成时触发
# - branches: [main] - 仅当CI在main分支运行时触发
# ============================================
on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

# ============================================
# 全局环境变量
# REGISTRY: 容器镜像仓库地址，ghcr.io为GitHub容器注册表
# IMAGE_NAME: 镜像名称，使用github.repository格式，如owner/project-name
# ============================================
env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

# ============================================
# 作业定义
# build-frontend → build-backend → build-and-push → deploy (串行执行)
# ============================================
jobs:
  # ------------------------------------------
  # 作业1: 构建前端（Dioxus Web）
  # 目的: 使用Trunk构建前端为WebAssembly
  # 符合规则7: Dioxus用trunk构建
  # ------------------------------------------
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    # 仅当CI成功时才执行
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Install Trunk
        run: cargo install trunk
      - name: Install WASM target
        run: rustup target add wasm32-unknown-unknown
      - name: Install binaryen
        run: |
          wget -q https://github.com/WebAssembly/binaryen/releases/download/version_115/binaries-ubuntu-x86_64.tar.gz
          tar -xzf binaries-ubuntu-x86_64.tar.gz
          sudo cp binaries-ubuntu-x86_64/* /usr/local/bin/
          rm -rf binaries-ubuntu-x86_64*
      - name: Build frontend
        working-directory: ./crates/frontend
        run: trunk build --release
      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: crates/frontend/dist

  # ------------------------------------------
  # 作业2: 构建后端（Axum）
  # 目的: 构建后端为可执行文件
  # 符合规则7: 后端release构建
  # ------------------------------------------
  build-backend:
    name: Build Backend
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build backend
        run: cargo build --release -p backend
      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend
          path: target/release/app

  # ------------------------------------------
  # 作业3: 构建并推送Docker镜像
  # 目的: 将代码打包成Docker镜像并推送到容器仓库
  # 前置条件: 前端和后端构建完成
  # 符合规则7: Docker+Nginx部署
  # ------------------------------------------
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: [build-frontend, build-backend]
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Download frontend artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - name: Download backend artifacts
        uses: actions/download-artifact@v4
        with:
          name: backend
          path: .

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,event=branch
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Push Docker image
        run: docker push ${{ steps.meta.outputs.tags }}

  # ------------------------------------------
  # 作业4: 部署到Ubuntu服务器
  # 目的: 自动化部署到远程服务器 39.96.223.65
  # 说明: 使用SSH连接服务器，拉取新镜像并重启容器
  # 符合规则7: Docker+Nginx部署
  # ------------------------------------------
  deploy:
    name: Deploy to Ubuntu Server
    runs-on: ubuntu-latest
    needs: build-and-push
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add Known Hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H 39.96.223.65 >> ~/.ssh/known_hosts

      - name: Deploy to Server
        run: |
          ssh root@39.96.223.65 << 'ENDSSH'
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            
            docker stop rust-ci-demo || true
            docker rm rust-ci-demo || true
            
            docker run -d \
              --name rust-ci-demo \
              --restart always \
              -p 8080:8080 \
              ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            
            docker image prune -af
          ENDSSH

      - name: Deploy Success Notification
        run: |
          echo "::notice title=Deployment Successful::"
          echo "Application deployed to: http://39.96.223.65:8080"
          echo "Run ID: ${{ github.run_id }}"